<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #eef4ff, #f8fbff);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .card {
            width: 520px;
            background: white;
            border-radius: 28px;
            padding: 55px 45px;
            text-align: center;
            box-shadow: 0 18px 45px rgba(31,111,235,0.10);
            position: relative;
            animation: fadeIn 0.7s ease;
        }

        .circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #e8f1ff;
            margin: 0 auto 28px;
            position: relative;
            animation: pulse 2s infinite;
        }

        .circle::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 34px;
            height: 18px;
            border-left: 5px solid #1f6feb;
            border-bottom: 5px solid #1f6feb;
            transform: translate(-50%, -60%) rotate(-45deg);
        }

        h1 {
            margin: 0;
            font-size: 38px;
            color: #1f2937;
            letter-spacing: -0.5px;
        }

        p {
            margin-top: 18px;
            font-size: 18px;
            color: #64748b;
            line-height: 1.7;
        }

        .logout-btn {
            display: inline-block;
            margin-top: 38px;
            padding: 14px 34px;
            border-radius: 14px;
            background: #1f6feb;
            color: white;
            text-decoration: none;
            font-size: 17px;
            transition: 0.25s ease;
        }

        .logout-btn:hover {
            background: #185abc;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(31,111,235,0.18);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 rgba(31,111,235,0);
            }

            50% {
                box-shadow: 0 0 28px rgba(31,111,235,0.18);
            }

            100% {
                box-shadow: 0 0 0 rgba(31,111,235,0);
            }
        }
    </style>
</head>

<body>

<div class="card">

    <div class="circle"></div>

    <h1>Welcome, {{ username }}</h1>

    <p>
        You have successfully logged in
    </p>

    <a href="/logout" class="logout-btn">Logout</a>

</div>

</body>
</html>
