<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef4ff, #f8fbff);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page {
            width: 540px;
            animation: fadeIn 0.6s ease;
        }

        .page-title {
            text-align: center;
            margin-bottom: 32px;
        }

        .page-title .label {
            color: #1f6feb;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .page-title h1 {
            margin: 0;
            font-size: 38px;
            color: #111827;
            letter-spacing: -0.8px;
        }

        .card {
            background: white;
            padding: 42px;
            border-radius: 26px;
            box-shadow: 0 18px 45px rgba(31,111,235,0.10);
            text-align: center;
        }

        h2 {
            margin: 0 0 28px;
            color: #111827;
            font-size: 26px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 18px;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.25s ease;
        }

        input:focus {
            outline: none;
            border-color: #1f6feb;
            box-shadow: 0 0 0 4px rgba(31,111,235,0.10);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: #1f6feb;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.25s ease;
        }

        button:hover {
            background: #185abc;
            transform: translateY(-2px);
        }

        .link {
            display: block;
            margin-top: 22px;
            color: #1f6feb;
            text-decoration: none;
            font-size: 15px;
        }

        .error {
            background: #ffe5e5;
            color: #b00020;
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 18px;
            text-align: center;
        }

        .success-circle {
            width: 82px;
            height: 82px;
            border-radius: 50%;
            background: #e8f1ff;
            margin: 0 auto 24px;
            position: relative;
            animation: pulse 2s infinite;
        }

        .success-circle::after {
            content: "";
            position: absolute;
            width: 28px;
            height: 14px;
            border-left: 5px solid #1f6feb;
            border-bottom: 5px solid #1f6feb;
            transform: rotate(-45deg);
            top: 28px;
            left: 24px;
        }

        .success-title {
            font-size: 30px;
            color: #111827;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .success-text {
            color: #64748b;
            font-size: 17px;
            margin-bottom: 12px;
        }

        .redirect-text {
            color: #94a3b8;
            font-size: 14px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(22px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 rgba(31,111,235,0);
            }
            50% {
                box-shadow: 0 0 24px rgba(31,111,235,0.18);
            }
            100% {
                box-shadow: 0 0 0 rgba(31,111,235,0);
            }
        }
    </style>

    {% if success %}
    <script>
        setTimeout(() => {
            window.location.href = "/";
        }, 2200);
    </script>
    {% endif %}
</head>

<body>

<div class="page">

    <div class="page-title">
        <div class="label">New Account</div>
        <h1>TOTP Simulation</h1>
    </div>

    {% if success %}

        <div class="card">
            <div class="success-circle"></div>
            <div class="success-title">Registration Complete</div>
            <div class="success-text">Your account has been created successfully.</div>
            <div class="redirect-text">Redirecting to login...</div>
        </div>

    {% else %}

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <div class="card">
            <h2>Create Account</h2>

            <form method="POST" action="/register">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Create Account</button>
            </form>

            <a href="/" class="link">
                Already have an account? Login
            </a>
        </div>

    {% endif %}

</div>

</body>
</html>
