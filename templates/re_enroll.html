<!DOCTYPE html>
<html>
<head>
    <title>Re-enrollment</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #eef4ff, #f8fbff);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page {
            width: 540px;
            animation: fadeIn 0.6s ease;
        }

        .page-title {
            text-align: center;
            margin-bottom: 32px;
        }

        .label {
            color: #1f6feb;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 38px;
            color: #111827;
        }

        .card {
            background: white;
            padding: 42px;
            border-radius: 26px;
            box-shadow: 0 18px 45px rgba(31,111,235,0.10);
            text-align: center;
        }

        h2 {
            margin: 0 0 24px;
            color: #111827;
            font-size: 26px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 18px;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #1f6feb;
            box-shadow: 0 0 0 4px rgba(31,111,235,0.10);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: #1f6feb;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .success, .error {
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 18px;
            text-align: center;
        }

        .success {
            background: #e7f8ec;
            color: #137333;
        }

        .error {
            background: #ffe5e5;
            color: #b00020;
        }

        .secret-box {
            background: #f8fbff;
            border: 1px solid #dbeafe;
            border-radius: 14px;
            padding: 16px;
            margin-top: 18px;
            color: #1f6feb;
            word-break: break-all;
            font-weight: bold;
        }

        .link {
            display: block;
            margin-top: 22px;
            color: #1f6feb;
            text-decoration: none;
            font-size: 15px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(22px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="page">

    <div class="page-title">
        <div class="label">Recovery</div>
        <h1>Re-enrollment</h1>
    </div>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    {% if success %}
        <div class="success">{{ success }}</div>
    {% endif %}

    <div class="card">

        <h2>Reset Authenticator</h2>

        <form method="POST" action="/re-enroll">
           <input type="text" name="username" placeholder="Username" required>
           <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Generate New Secret</button>
        </form>

        {% if new_secret %}
            <div class="secret-box">
                New Shared Secret:<br>
                {{ new_secret }}
            </div>
        {% endif %}

        <a href="/" class="link">Back to Login</a>

    </div>

</div>

</body>
</html>
